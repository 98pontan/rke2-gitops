apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-iss-tracker
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  alert-iss-tracker.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: one-min
        folder: iss-tracker
        interval: 1m
        rules:
          - uid: eff80iuuktfk0d
            title: Missing ISS-tracker
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  editorMode: builder
                  expr: kube_deployment_status_replicas{deployment="iss-tracker"}
                  instant: true
                  intervalMs: 1000
                  legendFormat: __auto
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                      - evaluator:
                          params:
                              - 0
                          type: eq
                        operator:
                          type: and
                        query:
                          params:
                              - C
                        reducer:
                          params: []
                          type: last
                        type: query
                  datasource:
                      type: __expr__
                      uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            isPaused: false
            notification_settings:
              receiver: Pontus Jirbratt
