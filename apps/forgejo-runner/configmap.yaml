      level: info
    container:
      docker_host: "unix:///var/run/docker.sock"
      options: "--add-host=forgejo-http:10.43.86.23"
    # FIXED: The new declarative connection schema for Forgejo v12+
    server:
      connections:
        devops-cluster:
          url: "http://forgejo-http:3000"
          # Paste the EXACT values generated from the Forgejo UI creation dialog:
