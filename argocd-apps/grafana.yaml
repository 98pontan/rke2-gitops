apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dash-alerts
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/98pontan/rke2-gitops.git
    path: grafana/
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
