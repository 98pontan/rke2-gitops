apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
spec:
  # Uses the 'infra' or 'devops-tools' AppProject we discussed earlier
  project: infra
  source:
    repoURL: 'code.forgejo.org/forgejo-helm'
    chart: forgejo
    targetRevision: 17.1.0 # Latest verified stable Helm wrapper version
    helm:
      values: |
        gitea:
          config:
            server:
              DOMAIN: "forgejo.local"
              ROOT_URL: "https://forgejo.local/"
              HTTP_PORT: 3000
              # FIXED: Explicitly tell the UI engine to construct links using port 2222
              SSH_DOMAIN: "forgejo.local"
              SSH_PORT: 2222
              START_SSH_SERVER: true # Ensures Forgejo spins up its internal SSH listener
            packages:
              ENABLED: "true"
            actions:
              ENABLED: "true"
            service:
              DISABLE_REGISTRATION: false
              REQUIRE_SIGNIN_VIEW: true

        persistence:
          enabled: true
          storageClass: "longhorn"
          size: "20Gi"

        ingress:
          enabled: true
          className: "nginx"
          hosts:
            - host: forgejo.local
              paths:
                - path: /
                  pathType: Prefix

        service:
          ssh:
            enabled: true
            type: ClusterIP
            port: 22
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devops-ci
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
