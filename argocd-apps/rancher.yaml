apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://releases.rancher.com/server-charts/stable'
    chart: rancher
    targetRevision: v2.14.2 # Replace with your desired Rancher version
    helm:
      parameters:
        - name: hostname
          value: rancher.local # Replace with your actual domain
        - name: bootstrapPassword
          value: "hello123" # Change this for initial login
        - name: replicas
          value: "1"

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cattle-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
